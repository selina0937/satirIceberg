    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f9ff; }

        .chat-bubble-enter { animation: bubbleIn 0.3s ease-out forwards; }
        @keyframes bubbleIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }

        .user-a-box { padding: 16px; width: 65%; display: flex; flex-direction: column; justify-content: center; }
        .layer-0 { width: 85%; max-width: 28rem; border-radius: 24px 24px 8px 8px; }
        .layer-1 { width: 90%; max-width: 30rem; border-radius: 8px; }
        .layer-2 { width: 95%; max-width: 32rem; border-radius: 8px; }
        .layer-3 { width: 98%; max-width: 34rem; border-radius: 8px; }
        .layer-4 { width: 100%; max-width: 36rem; background: rgba(15, 23, 42, 0.95) !important; border-radius: 8px 8px 24px 24px; border: 1px solid #1e293b; margin-bottom: 30px; }

        @media print {
            .no-print { display: none !important; } * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            html, body { display: block !important; height: auto !important; max-height: none !important; overflow: visible !important; position: static !important; background: transparent !important; }
            main, section, div, p { height: auto !important; max-height: none !important; overflow: visible !important; page-break-inside: auto !important; }
            main { display: block !important; } #chat-section { display: none !important; } 
            #visual-section { width: 100% !important; max-width: 100% !important; display: block !important; padding: 0 !important; background: transparent !important; position: static !important; }
            .iceberg-container { background: transparent !important; box-shadow: none !important; padding: 0 !important; display: block !important; position: static !important; }
            img#iceberg-bg-img { display: none !important; } 
            #pdf-fixed-bg { display: block !important; position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; width: 100% !important; height: 100% !important; z-index: -1 !important; opacity: 0.3 !important; pointer-events: none !important; }
            #pdf-fixed-bg img { width: 100% !important; height: 100% !important; object-fit: cover !important; object-position: top center !important; }
            .print-title { display: block !important; text-align: center; margin-bottom: 1cm; border-bottom: 3px solid #000; padding-bottom: 15px; }
            .visual-layer { opacity: 1 !important; transform: none !important; page-break-inside: avoid !important; margin-bottom: 25px !important; border: 2px solid #333 !important; width: 100% !important; max-width: 100% !important; border-radius: 12px !important; display: flex !important; flex-direction: row !important; background: rgba(255,255,255,0.95) !important; position: relative !important; z-index: 10 !important; }
            .ai-q-box { width: 30% !important; border-right: 2px solid #ddd !important; background: #f8fafc !important; }
            .user-a-box { width: 70% !important; background: #fff !important; }
            .visual-layer p, .visual-layer div, .ai-analysis-text { color: #000 !important; font-size: 12pt !important; line-height: 1.6; -webkit-line-clamp: unset !important; white-space: pre-wrap !important; }
            .layer-4 { background: #fff !important; border-color: #333 !important; } .layer-4 .ai-q-box { background: #f8fafc !important; border-bottom-color: #ddd !important; } .layer-4 .user-a-box { background: #fff !important; } .layer-4 p, .layer-4 div, .layer-4 h4, .layer-4 span, .layer-4 .ai-analysis-text { color: #000 !important; text-shadow: none !important; }
        }

<!-- ================= 核心邏輯 ================= -->
<script>
// 變更：將預設 URL 直接指向 Vercel 的相對路徑，免除手動設定的煩惱
const DEFAULT_PROXY_URL = "https://satir-iceberg.vercel.app/api/chat"; 

const STAGE_GOALS = [
    "▶ 目前階段：【行為與感受】。使用者描述事件與情緒。請同理並剖析。",
    "▶ 目前階段：【觀點與意義】。使用者回答對事件看法。請點出盲點。",
    "▶ 目前階段：【期待】。使用者回答原本希望的發展。請分析期待是否落空。",
    "▶ 目前階段：【渴望】。使用者回答底層渴望。請深刻接納並肯定。",
    "▶ 目前階段：【真實自我】。使用者回答如何自我滿足。請給予賦能總結。"
];

const STAGES = [
    { id: 0, nextQ: "第二步：觀點與意義。你對這件事或對方說的話，在心裡『賦予了什麼意義』？這背後是不是有什麼「應該」或「必須」的規條？" },
    { id: 1, nextQ: "第三步：期待。在那種情況下，你原本心裡『希望』事情怎麼發展？你對對方或對自己有什麼具體的期待？" },
    { id: 2, nextQ: "第四步：渴望。在這個失落的期待背後，你真正渴望的，是不是想要感覺被愛、被接納、被重視、有安全感，或者是想要連結與自由？" },
    { id: 3, nextQ: "第五步：真實自我。既然看到了自己真正渴望的，現在這個具有生命力且完整的『你』，可以怎麼主動為自己滿足這個渴望，而不依賴對方的改變？" },
    { id: 4, isSummary: true }
];

let currentStep = 0; let chatHistory = []; let analyzedYearning = "";
let chatContainer, userInputArea, sendBtn, inputWrapper, pdfBtn, transitionBtn, stepIndicator;

// 供外部 Firebase 呼叫的 Token 更新與取得函數
let currentUserUid = null;
let currentTokens = 0;
let updateFirestoreTokens = null; // 稍後在 Firebase 區塊內綁定
let triggerGoogleLogin = null;    // 稍後在 Firebase 區塊內綁定

function showModal(title, desc, icon = '💡', actionText = null, actionFn = null) {
    document.getElementById('modal-icon').innerText = icon;
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-desc').innerText = desc;
    const actionBtn = document.getElementById('modal-action-btn');
    if(actionText && actionFn) {
        actionBtn.innerText = actionText;
        actionBtn.onclick = () => { actionFn(); closeModal(); };
        actionBtn.classList.remove('hidden');
    } else {
        actionBtn.classList.add('hidden');
    }
    const modal = document.getElementById('custom-modal');
    modal.classList.remove('hidden');
}

function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }

async function callGemini(userMessage) {
    let proxyUrl = localStorage.getItem('SATIR_PROXY_URL') || DEFAULT_PROXY_URL;
    
    // 如果使用者手動輸入了包含 http 的絕對網址，才做額外處理，否則直接使用 /api/chat
    if (proxyUrl.startsWith('http') && !proxyUrl.includes('/api/chat')) {
        proxyUrl = proxyUrl.endsWith('/') ? proxyUrl + 'api/chat' : proxyUrl + '/api/chat';
    }

    const stageGoal = STAGE_GOALS[currentStep];
    const nextStepInstruction = STAGES[currentStep].isSummary
        ? "【下一步指令】這是最後一步。不要再提問。請給予一段精闢洞察總結，並務必在最尾端加上 [STEP_COMPLETE] 標記。"
        : "【下一步指令】若回答過關，請先給予簡短分析，然後『務必』一字不漏地拋出以下問題繼續引導：\n" + STAGES[currentStep].nextQ + "\n\n最尾端加上 [STEP_COMPLETE]。絕對不可自己發明問題！";

    const systemInstruction = `你是精通薩提爾模型的心理教練。
1. 嚴格字數限制：每次回覆總字數絕對不可超過 200 字！
2. 一次一步：絕對不要自行跳換步驟。
3. 拯救不知道：若使用者回答不知道，你必須主動提供 2~3 個可能的心理動力選項。此時『絕對不要』輸出 [STEP_COMPLETE]。
4. 過關與推進：只要具體回答即過關，確實執行下方【下一步指令】。
${stageGoal}
${nextStepInstruction}
語言：繁體中文。`;

    const context = chatHistory.slice(-6).map(h => ({ role: h.role === 'coach' ? 'model' : 'user', parts: [{ text: h.text }] }));
    try {
        const res = await fetch(proxyUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: context, systemInstruction }) });
        if (res.ok) {
            const data = await res.json(); 
            // API 呼叫成功，扣除雲端 Token！
            if(data.tokenUsage && currentUserUid && updateFirestoreTokens) {
                const used = data.tokenUsage.totalTokenCount;
                await updateFirestoreTokens(used);
            }
            return data.text;
        } else {
            if (res.status === 429) return "⚠️ 【系統提示：API 額度耗盡 (HTTP 429)】\n\n模擬過關。\n\n教練分析：您的覺察很深刻！ [STEP_COMPLETE]";
            return `❌ 伺服器異常 (HTTP ${res.status})`;
        }
    } catch (err) { return `❌ 連線失敗: ${err.message}`; }
}

function createMessage(text, isUser) {
    const w = document.createElement('div'); w.className = `flex w-full chat-bubble-enter ${isUser ? 'justify-end' : 'justify-start'}`;
    const b = document.createElement('div'); b.className = `max-w-[90%] p-4 rounded-2xl shadow-sm ${isUser ? 'bg-sky-700 text-white rounded-tr-none' : 'bg-white border border-stone-200 text-slate-800 rounded-tl-none'}`;
    if (!isUser) b.innerHTML = `<div class="text-[9px] font-bold text-sky-600 mb-1 uppercase tracking-widest">心理教練</div>`;
    const c = document.createElement('div'); c.className = 'whitespace-pre-wrap leading-relaxed text-[14px]'; c.textContent = text;
    b.appendChild(c); w.appendChild(b); return w;
}

async function handleSend() {
    const input = userInputArea.value.trim(); if (!input) return;

    // 商業化防線 1：檢查登入 (沉沒成本發威點)
    if (!currentUserUid) {
        showModal(
            "需要登入以解鎖分析", 
            "系統已準備好為您進行深度潛意識解碼。\n\n請登入您的 Google 帳號，以保存這份珍貴的分析紀錄，並領取 5,000 點免費新手體驗點數！", 
            "🔒", 
            "一鍵登入", 
            () => { if(triggerGoogleLogin) triggerGoogleLogin(); }
        );
        return; // 阻擋送出
    }

    // 商業化防線 2：檢查餘額
    if (currentTokens <= 0) {
        showModal(
            "點數已耗盡", 
            "您的靈魂體驗點數已用完，無法繼續呼叫 AI 教練。\n\n(金流系統建置中，您可以請管理員手動至資料庫為您加值！)", 
            "💳"
        );
        return; // 阻擋送出
    }

    chatContainer.appendChild(createMessage(input, true)); chatHistory.push({ role: "user", text: input });
    userInputArea.value = ''; userInputArea.disabled = true; sendBtn.disabled = true;
    if (currentStep === 0 && !localStorage.getItem('satir_event_context')) localStorage.setItem('satir_event_context', input);

    const typing = document.createElement('div'); typing.id = 'typing-indicator'; typing.className = 'flex justify-start chat-bubble-enter';
    typing.innerHTML = `<div class="bg-white border border-stone-200 p-3 rounded-xl shadow-sm"><div class="text-[10px] text-slate-400 italic">教練精準分析中... (將扣除點數)</div></div>`;
    chatContainer.appendChild(typing); chatContainer.scrollTop = chatContainer.scrollHeight;

    const coachResponse = await callGemini(input);
    
    if (document.getElementById('typing-indicator')) document.getElementById('typing-indicator').remove();
    const isComplete = coachResponse.includes("[STEP_COMPLETE]"); const cleanResponse = coachResponse.replace("[STEP_COMPLETE]", "").trim();
    chatContainer.appendChild(createMessage(cleanResponse, false)); chatHistory.push({ role: "coach", text: cleanResponse });

    if (coachResponse.includes("❌")) { userInputArea.disabled = false; sendBtn.disabled = false; return; }

    if (isComplete) {
        const layerEl = document.getElementById(`layer-${currentStep}`); const textEl = document.getElementById(`layer-text-${currentStep}`); const analysisEl = document.getElementById(`layer-analysis-${currentStep}`);
        if(layerEl && textEl && analysisEl) {
            layerEl.classList.add('active'); textEl.textContent = input; textEl.classList.remove('italic');
            analysisEl.innerHTML = `<span class="font-bold border-b border-current pb-0.5 inline-block mb-1">教練洞察分析：</span><br>${cleanResponse}`; analysisEl.classList.remove('hidden');
            if (currentStep === 3) analyzedYearning = cleanResponse; 
        }
        currentStep++;
        if (currentStep < STAGES.length) {
            stepIndicator.textContent = `Phase ${currentStep + 1} / ${STAGES.length}`; userInputArea.disabled = false; sendBtn.disabled = false; userInputArea.focus();
        } else {
            userInputArea.disabled = true; sendBtn.disabled = true; inputWrapper.classList.add('hidden'); transitionBtn.classList.remove('hidden'); pdfBtn.classList.remove('hidden'); 
            localStorage.setItem('satir_discovered_yearning', analyzedYearning || "被愛與尊重"); localStorage.setItem('satir_phase1_completed', 'true');
        }
    } else { userInputArea.disabled = false; sendBtn.disabled = false; userInputArea.focus(); }
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

document.addEventListener('DOMContentLoaded', () => {
    chatContainer = document.getElementById('chat-container'); userInputArea = document.getElementById('user-input'); sendBtn = document.getElementById('btn-send'); inputWrapper = document.getElementById('input-area');
    pdfBtn = document.getElementById('btn-pdf'); transitionBtn = document.getElementById('stage-transition-btn'); stepIndicator = document.getElementById('step-indicator');
    localStorage.removeItem('satir_event_context'); localStorage.removeItem('satir_discovered_yearning');
    document.getElementById('btn-start-alchemy').onclick = () => { window.location.href = 'actionSimulator.html'; };

    let logoClickCount = 0; const modalConfig = document.getElementById('modal-settings'); const proxyIn = document.getElementById('proxy-url-input');
    document.getElementById('header-logo').onclick = () => { logoClickCount++; if(logoClickCount >= 5) { modalConfig.classList.remove('hidden'); proxyIn.value = localStorage.getItem('SATIR_PROXY_URL') || DEFAULT_PROXY_URL; logoClickCount = 0; } };
    document.getElementById('btn-modal-close').onclick = () => modalConfig.classList.add('hidden');
    document.getElementById('btn-modal-save').onclick = () => { localStorage.setItem('SATIR_PROXY_URL', proxyIn.value.trim()); modalConfig.classList.add('hidden'); location.reload(); };

    pdfBtn.onclick = () => window.print(); sendBtn.onclick = handleSend;
    userInputArea.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
    document.getElementById('btn-reset').onclick = () => location.reload();
    chatContainer.appendChild(createMessage("您好。請簡短描述一件最近讓你感到有情緒、受挫的事件。當時發生了什麼事？你採取了什麼應對姿態？真實情緒是什麼？", false));
});

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    
    // TODO: 請替換為您的 Firebase Config
    const firebaseConfig = {
  apiKey: "AIzaSyCVUQRXSsmSqHriQNqRMRr7LjrRBSUhAhM",
  authDomain: "satir-iceberg.vercel.app",
  projectId: "satiriceberg-c1edd",
  storageBucket: "satiriceberg-c1edd.firebasestorage.app",
  messagingSenderId: "1095208613783",
  appId: "1:1095208613783:web:698bddaed121b2aeb7b6d2",
  measurementId: "G-TYTJP45Q94"
};
    
    const app = initializeApp(firebaseConfig); 
    const auth = getAuth(app); 
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    
    const authBtn = document.getElementById('auth-btn'); 
    const userInfo = document.getElementById('user-info');
    const walletBadge = document.getElementById('wallet-badge');
    const tokenBalanceDisplay = document.getElementById('token-balance');
    let unsubscribeSnapshot = null;

    // 將登入功能暴露給全域，讓「送出防呆」可以呼叫
    triggerGoogleLogin = async () => { try { await signInWithPopup(auth, provider); } catch (e) { console.error(e); } };

    // 實作扣點函數，綁定給全域使用
    updateFirestoreTokens = async (usedTokens) => {
        if(!currentUserUid) return;
        const userRef = doc(db, "users", currentUserUid);
        await updateDoc(userRef, { tokens: increment(-usedTokens) });
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUserUid = user.uid;
            
            // 1. UI 變更為登入狀態
            userInfo.innerHTML = `<img src="${user.photoURL}" class="w-6 h-6 rounded-full"><span class="text-xs font-bold text-stone-600">${user.displayName}</span>`;
            authBtn.innerHTML = `登出`; authBtn.classList.replace('text-stone-600', 'text-red-500'); 
            authBtn.onclick = () => signOut(auth);
            walletBadge.classList.remove('hidden');
            walletBadge.classList.add('flex');

            // 2. Firestore 讀取/創建會員資料 (贈送新手 5000 點)
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            
            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    name: user.displayName,
                    email: user.email,
                    tokens: 5000,
                    createdAt: new Date()
                });
            }

            // 3. 設定即時監聽 (如果管理員從後台改數字，網頁會瞬間變更！)
            unsubscribeSnapshot = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    currentTokens = docSnap.data().tokens;
                    // 加入逗號格式化 (如 5,000)
                    tokenBalanceDisplay.innerText = currentTokens.toLocaleString();
                    
                    // 根據餘額改變顏色提示
                    if(currentTokens < 500) {
                        tokenBalanceDisplay.classList.replace('text-sky-600', 'text-red-500');
                    } else {
                        tokenBalanceDisplay.classList.replace('text-red-500', 'text-sky-600');
                    }
                }
            });

        } else {
            // 未登入狀態
            currentUserUid = null;
            currentTokens = 0;
            if(unsubscribeSnapshot) unsubscribeSnapshot(); // 取消資料庫監聽
            
            userInfo.innerHTML = ''; 
            walletBadge.classList.add('hidden');
            walletBadge.classList.remove('flex');
            
            authBtn.innerHTML = `登入`; authBtn.classList.replace('text-red-500', 'text-stone-600');
            authBtn.onclick = triggerGoogleLogin;
        }
    });
</script>
