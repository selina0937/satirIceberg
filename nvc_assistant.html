<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關係修復指南 - 進階版非暴力溝通 (NVC) 助理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0fdf4; }
        .visual-layer { transition: all 0.4s ease-out; opacity: 0.1; transform: translateX(-10px); }
        .visual-layer.active { opacity: 1; transform: translateX(0); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .chat-bubble-enter { animation: bubbleIn 0.3s ease-out forwards; }
        @keyframes bubbleIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #86efac; border-radius: 10px; }

        @media print {
            .no-print { display: none !important; } * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            html, body, main, section, div, p { height: auto !important; max-height: none !important; overflow: visible !important; page-break-inside: auto !important; }
            main { display: block !important; } #chat-section { display: none !important; } 
            #visual-section { width: 100% !important; display: block !important; padding: 0 !important; background: white !important; }
            .print-title { display: block !important; text-align: center; margin-bottom: 1cm; border-bottom: 3px solid #000; padding-bottom: 15px; }
            .visual-layer { page-break-inside: avoid !important; margin-bottom: 20px !important; border: 2px solid #333 !important; border-radius: 12px !important; display: block !important; background: #fff !important; }
            .ai-q-box { background: #f0fdf4 !important; border-bottom: 2px solid #ddd !important; padding: 12px !important; display: block !important; }
            .user-a-box { padding: 12px !important; display: block !important; }
            .visual-layer p, .visual-layer div, .ai-analysis-text { color: #000 !important; font-size: 11pt !important; line-height: 1.6; -webkit-line-clamp: unset !important; white-space: pre-wrap !important; }
            #layer-4 { background: #fff !important; border-color: #333 !important; } #layer-4 .ai-q-box { background: #f0fdf4 !important; border-bottom-color: #ddd !important; } #layer-4 h4, #layer-4 p, #layer-4 div, #layer-4 .ai-analysis-text { color: #000 !important; text-shadow: none !important; }
        }
        .print-title { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-900">

<div id="token-secret-btn" class="fixed bottom-0 right-0 w-16 h-16 z-50 cursor-default" title="雙擊查看 Token 消耗" ondblclick="showTokenUsage()"></div>

<header class="bg-white border-b border-emerald-200 px-6 py-3 flex justify-between items-center shadow-sm shrink-0 z-40 no-print">
    <div class="flex items-center gap-4"><a href="index.html" class="flex items-center gap-1 text-sm font-bold text-stone-500 hover:text-emerald-600 transition-colors bg-stone-100 px-3 py-1.5 rounded-full"><span>🏠</span> 首頁</a><div class="flex items-center gap-2"><span class="text-2xl">🤝</span><h1 class="text-base font-bold tracking-tight text-emerald-900">非暴力溝通助理 <span class="text-[10px] bg-emerald-600 text-white px-2 py-0.5 rounded ml-1">NVC</span></h1></div></div>
    <div class="flex items-center gap-3">
        <div id="user-info" class="flex items-center gap-2 hidden md:flex"></div>
        <button id="auth-btn" class="bg-white border border-emerald-200 hover:bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full text-xs font-bold flex items-center shadow-sm transition-all">登入</button>
        <div class="w-px h-4 bg-emerald-200 mx-1"></div>
        <button id="btn-pdf" class="hidden text-xs px-4 py-2 bg-emerald-700 hover:bg-emerald-800 text-white rounded-full font-bold shadow-lg">匯出 NVC 報告</button>
    </div>
</header>

<main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
    <section id="chat-section" class="w-full md:w-[40%] flex flex-col h-[50vh] md:h-full border-r border-emerald-200 bg-white z-20 shadow-2xl overflow-hidden no-print">
        <div class="p-4 bg-emerald-50 border-b border-emerald-100 shrink-0"><h2 class="text-sm font-bold text-emerald-900"><span>🕊️</span> 溝通轉化教練</h2></div>
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-4 bg-[#f0fdf4]"></div>
        <div class="p-4 bg-white border-t border-emerald-100 shrink-0 z-30">
            <div id="input-area" class="flex flex-col gap-3">
                <textarea id="user-input" rows="3" class="w-full resize-none rounded-xl border border-emerald-300 p-3 text-sm focus:ring-2 focus:ring-emerald-600 bg-emerald-50 shadow-inner" placeholder="請輸入..."></textarea>
                <div class="flex justify-between items-center"><span id="step-indicator" class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest">Phase 1/5</span><button id="btn-send" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-full font-bold shadow-md active:scale-95 transition-all">送出 ➤</button></div>
            </div>
            <div id="completion-msg" class="hidden text-center mt-3 pt-3 border-t border-stone-100"><p class="text-xs text-emerald-700 font-bold">🎉 腳本已完成。請匯出 PDF 報告。</p></div>
        </div>
    </section>

    <section id="visual-section" class="w-full md:w-[60%] h-[50vh] md:h-full bg-[#f8fafc] overflow-y-auto relative flex flex-col p-4 lg:p-8">
        <div class="print-title"><h1 class="text-3xl font-bold text-emerald-900">非暴力溝通 (NVC) 轉化報告</h1></div>
        <div class="w-full max-w-2xl mx-auto space-y-4 relative z-0 pb-10">
            <div id="layer-0" class="visual-layer active bg-white border border-emerald-200 rounded-2xl overflow-hidden shadow-sm"><div class="ai-q-box bg-emerald-50 border-b border-emerald-100 p-3"><h4 class="font-bold text-[12px] text-emerald-800 uppercase mb-1">0. 容納之窗</h4></div><div class="user-a-box p-4"><div id="layer-text-0" class="text-sm font-bold">等待評估...</div><div id="layer-analysis-0" class="hidden mt-3 pt-3 border-t text-[12px] text-emerald-800"></div></div></div>
            <div id="layer-1" class="visual-layer bg-white border border-emerald-200 rounded-2xl overflow-hidden shadow-sm"><div class="ai-q-box bg-emerald-50 border-b border-emerald-100 p-3"><h4 class="font-bold text-[12px] text-emerald-800 uppercase mb-1">1. 觀察</h4></div><div class="user-a-box p-4"><div id="layer-text-1" class="text-sm font-bold italic">尚未觸及...</div><div id="layer-analysis-1" class="hidden mt-3 pt-3 border-t text-[12px] text-emerald-800"></div></div></div>
            <div id="layer-2" class="visual-layer bg-white border border-emerald-200 rounded-2xl overflow-hidden shadow-sm"><div class="ai-q-box bg-emerald-50 border-b border-emerald-100 p-3"><h4 class="font-bold text-[12px] text-emerald-800 uppercase mb-1">2. 感受</h4></div><div class="user-a-box p-4"><div id="layer-text-2" class="text-sm font-bold italic">尚未觸及...</div><div id="layer-analysis-2" class="hidden mt-3 pt-3 border-t text-[12px] text-emerald-800"></div></div></div>
            <div id="layer-3" class="visual-layer bg-white border border-emerald-200 rounded-2xl overflow-hidden shadow-sm"><div class="ai-q-box bg-emerald-50 border-b border-emerald-100 p-3"><h4 class="font-bold text-[12px] text-emerald-800 uppercase mb-1">3. 需要與界線</h4></div><div class="user-a-box p-4"><div id="layer-text-3" class="text-sm font-bold italic">尚未觸及...</div><div id="layer-analysis-3" class="hidden mt-3 pt-3 border-t text-[12px] text-emerald-800"></div></div></div>
            <div id="layer-4" class="visual-layer bg-emerald-900 border border-emerald-800 rounded-3xl overflow-hidden shadow-xl mt-4 mb-10"><div class="ai-q-box bg-emerald-800 border-b p-5"><h4 class="font-bold text-[12px] text-emerald-300 uppercase mb-1">4. 請求與界線表達</h4></div><div class="user-a-box p-5"><div id="layer-text-4" class="text-[15px] text-emerald-50 font-bold italic">準備生成腳本中...</div><div id="layer-analysis-4" class="hidden mt-4 pt-4 border-t text-[13px] text-emerald-200"></div></div></div>
        </div>
    </section>
</main>

<script>
const DEFAULT_PROXY_URL = ""; 
const STAGES = [
    { id: 0, nextQ: "第一步：觀察。請試著用「攝影機拍得到」的客觀語言描述引發情緒的事，不帶猜測。" },
    { id: 1, nextQ: "第二步：感受。看到這個事實，你單純的情緒是什麼？（例如：難過、生氣、害怕）" },
    { id: 2, nextQ: "第三步：需要與界線。這背後你渴望被看見的心聲是什麼？保護自己不舒服的界線是什麼？" },
    { id: 3, nextQ: "第四步：請求與界線表達。寫出一句溫和堅定的話，表明在什麼條件下你才願意對話。" },
    { id: 4, isSummary: true }
];

let currentStep = 0; let chatHistory = []; let sessionTokenCount = 0;
let chatContainer, userInputArea, sendBtn, pdfBtn, stepIndicator, completionMsg, inputWrapper;

async function callGemini(userMessage) {
    let proxyUrl = localStorage.getItem('SATIR_PROXY_URL') || DEFAULT_PROXY_URL;
    if (proxyUrl.startsWith('http') && !proxyUrl.includes('/api/chat')) proxyUrl = proxyUrl.endsWith('/') ? proxyUrl + 'api/chat' : proxyUrl + '/api/chat';

    const stage = STAGES[currentStep];
    const systemInstruction = `你是深諳心理學的 NVC 教練。
1. 拒絕廢話：不要說謝謝分享。但必須給予深度的心理學解析。
2. 字數：${stage.isSummary ? "總結 400 字左右。" : "每次回覆 200 字以內。"}
3. 容納之窗防護：若在階段 0 使用者情緒崩潰，引導設立暫停界線。
4. 分析與糾正：判斷回答是否符合 NVC。若不知，提供選項，不准過關。
5. 過關標記：若符合，在尾端加上 [STEP_COMPLETE]。
${stage.isSummary ? "6. 輸出三區塊總結：1. NVC金句 2. NG說法對比 3. 表情技巧。加上 [STEP_COMPLETE]。" : "6. 若過關，拋出指令：" + stage.nextQ}
繁體中文。`;

    const context = chatHistory.slice(-4).map(h => ({ role: h.role === 'coach' ? 'model' : 'user', parts: [{ text: h.text }] }));
    try {
        const res = await fetch(proxyUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: context, systemInstruction, mode: 'NVC' }) });
        if (res.ok) { const data = await res.json(); if(data.tokenUsage) sessionTokenCount += data.tokenUsage.totalTokenCount; return data.text; }
        else return `❌ 異常 (HTTP ${res.status})`;
    } catch (err) { return `❌ 連線失敗`; }
}

function createMessage(text, isUser) {
    const w = document.createElement('div'); w.className = `flex w-full chat-bubble-enter ${isUser ? 'justify-end' : 'justify-start'}`;
    const b = document.createElement('div'); b.className = `max-w-[90%] p-4 rounded-2xl shadow-sm ${isUser ? 'bg-emerald-700 text-white rounded-tr-none' : 'bg-white border text-slate-800 rounded-tl-none'}`;
    if (!isUser) b.innerHTML = `<div class="text-[9px] font-bold text-emerald-600 mb-1 uppercase tracking-widest">NVC 教練</div>`;
    const c = document.createElement('div'); c.className = 'whitespace-pre-wrap leading-relaxed text-[14px]'; c.textContent = text;
    b.appendChild(c); w.appendChild(b); return w;
}

async function handleSend() {
    const input = userInputArea.value.trim(); if (!input) return;
    chatContainer.appendChild(createMessage(input, true)); chatHistory.push({ role: "user", text: input });
    userInputArea.value = ''; userInputArea.disabled = true; sendBtn.disabled = true;
    const typing = document.createElement('div'); typing.id = 'typing-indicator'; typing.className = 'flex justify-start chat-bubble-enter'; typing.innerHTML = `<div class="bg-white p-3 rounded-xl"><div class="text-[10px] text-emerald-600 italic">分析中...</div></div>`;
    chatContainer.appendChild(typing); chatContainer.scrollTop = chatContainer.scrollHeight;

    const coachResponse = await callGemini(input);
    if (document.getElementById('typing-indicator')) document.getElementById('typing-indicator').remove();
    const isComplete = coachResponse.includes("[STEP_COMPLETE]"); const cleanResponse = coachResponse.replace("[STEP_COMPLETE]", "").trim();
    chatContainer.appendChild(createMessage(cleanResponse, false)); chatHistory.push({ role: "coach", text: cleanResponse });

    if (coachResponse.includes("❌")) { userInputArea.disabled = false; sendBtn.disabled = false; return; }

    if (isComplete) {
        const layerEl = document.getElementById(`layer-${currentStep}`); const textEl = document.getElementById(`layer-text-${currentStep}`); const analysisEl = document.getElementById(`layer-analysis-${currentStep}`);
        if(layerEl && textEl && analysisEl) { layerEl.classList.add('active'); textEl.textContent = input; textEl.classList.remove('italic'); analysisEl.innerHTML = `<span class="font-bold border-b pb-0.5 inline-block mb-1">教練分析：</span><br>${cleanResponse}`; analysisEl.classList.remove('hidden'); }
        currentStep++;
        if (currentStep < STAGES.length) { stepIndicator.textContent = `Phase ${currentStep + 1} / ${STAGES.length}`; userInputArea.disabled = false; sendBtn.disabled = false; userInputArea.focus(); }
        else { userInputArea.disabled = true; sendBtn.disabled = true; inputWrapper.classList.add('hidden'); completionMsg.classList.remove('hidden'); pdfBtn.classList.remove('hidden'); }
    } else { userInputArea.disabled = false; sendBtn.disabled = false; userInputArea.focus(); }
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

document.addEventListener('DOMContentLoaded', () => {
    chatContainer = document.getElementById('chat-container'); userInputArea = document.getElementById('user-input'); sendBtn = document.getElementById('btn-send'); pdfBtn = document.getElementById('btn-pdf'); stepIndicator = document.getElementById('step-indicator'); completionMsg = document.getElementById('completion-msg'); inputWrapper = document.getElementById('input-area');
    pdfBtn.onclick = () => window.print(); sendBtn.onclick = handleSend; userInputArea.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
    chatContainer.appendChild(createMessage(`歡迎來到 NVC 助理。\n\n在開始之前，請感受一下情緒。目前的壓力是否超過『情緒容納之窗』，想逃跑或反擊？請告訴我現在的狀態。`, false));
});
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCVUQRXSsmSqHriQNqRMRr7LjrRBSUhAhM",
  authDomain: "satiriceberg-c1edd.firebaseapp.com",
  projectId: "satiriceberg-c1edd",
  storageBucket: "satiriceberg-c1edd.firebasestorage.app",
  messagingSenderId: "1095208613783",
  appId: "1:1095208613783:web:698bddaed121b2aeb7b6d2",
  measurementId: "G-TYTJP45Q94"
};    

    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const provider = new GoogleAuthProvider();
    const authBtn = document.getElementById('auth-btn'); const userInfo = document.getElementById('user-info');
    onAuthStateChanged(auth, (user) => {
        if (user) { userInfo.innerHTML = `<img src="${user.photoURL}" class="w-6 h-6 rounded-full"><span class="text-xs font-bold text-emerald-800">${user.displayName}</span>`; authBtn.innerHTML = `登出`; authBtn.classList.replace('text-emerald-700', 'text-red-500'); authBtn.onclick = () => signOut(auth); }
        else { userInfo.innerHTML = ''; authBtn.innerHTML = `登入`; authBtn.classList.replace('text-red-500', 'text-emerald-700'); authBtn.onclick = async () => { try { await signInWithPopup(auth, provider); } catch (e) {} }; }
    });
</script>
</body>
</html>
