<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 行動煉金模擬器 - 第二階段</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fefce8; }
        .visual-layer { transition: all 0.4s ease-out; opacity: 0.1; transform: translateY(10px); }
        .visual-layer.active { opacity: 1; transform: translateY(0); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .chat-bubble-enter { animation: bubbleIn 0.3s ease-out forwards; }
        @keyframes bubbleIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #fcd34d; border-radius: 10px; }
        .tool-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; user-select: none; border: 2px solid transparent; }
        .tool-card:hover:not(.locked) { transform: translateY(-4px); border-color: #d97706; background-color: #fff7ed; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .tool-card.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); border-color: #d1d5db; }

        @media print {
            .no-print { display: none !important; } * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            html, body, main, section, div, p { height: auto !important; max-height: none !important; overflow: visible !important; page-break-inside: auto !important; }
            main { display: block !important; } #chat-section { display: none !important; } 
            #visual-section { width: 100% !important; display: block !important; padding: 0 !important; background: white !important; }
            .print-title { display: block !important; text-align: center; margin-bottom: 1cm; border-bottom: 3px solid #000; padding-bottom: 15px; }
            .visual-layer { page-break-inside: avoid !important; margin-bottom: 25px !important; border: 2px solid #333 !important; border-radius: 12px !important; display: flex !important; flex-direction: row !important; background: #fff !important; }
            .ai-q-box { width: 30% !important; background: #fffbeb !important; border-right: 2px solid #ddd !important; padding: 15px !important; display: block !important; }
            .user-a-box { width: 70% !important; padding: 15px !important; display: block !important; }
            .visual-layer p, .visual-layer div, .ai-analysis-text { color: #000 !important; font-size: 12pt !important; line-height: 1.6; -webkit-line-clamp: unset !important; white-space: pre-wrap !important; }
        }
        .print-title { display: none; } .ai-q-box { display: none; } 
        @media screen { .ai-q-box { display: flex; flex-direction: column; justify-content: center; width: 30%; border-right: 1px solid #fde68a; background: #fffbeb; padding: 16px; } .user-a-box { display: flex; flex-direction: column; justify-content: center; width: 70%; padding: 16px; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-900">

<div id="token-secret-btn" class="fixed bottom-0 right-0 w-16 h-16 z-50 cursor-default" title="雙擊查看 Token 消耗" ondblclick="showTokenUsage()"></div>

<header class="bg-white border-b border-amber-200 px-6 py-3 flex justify-between items-center shadow-sm shrink-0 z-40 no-print">
    <div class="flex items-center gap-4"><a href="index.html" class="flex items-center gap-1 text-sm font-bold text-stone-500 hover:text-amber-600 transition-colors bg-stone-100 px-3 py-1.5 rounded-full"><span>🏠</span> 首頁</a><div class="flex items-center gap-2"><span class="text-2xl">✨</span><h1 class="text-base font-bold tracking-tight text-amber-900">內在煉金模擬器 <span class="text-[10px] bg-amber-600 text-white px-2 py-0.5 rounded ml-1">Stage 2</span></h1></div></div>
    <div class="flex items-center gap-3">
        <div id="user-info" class="flex items-center gap-2 hidden md:flex"></div>
        <button id="auth-btn" class="bg-white border border-amber-200 hover:bg-amber-50 text-amber-700 px-3 py-1.5 rounded-full text-xs font-bold flex items-center shadow-sm transition-all">登入</button>
        <div class="w-px h-4 bg-amber-200 mx-1"></div>
        <button id="btn-pdf" class="hidden text-xs px-4 py-2 bg-amber-700 hover:bg-amber-800 text-white rounded-full font-bold shadow-lg">匯出煉金報告</button>
        <button onclick="window.location.href='satir_iceberg_spa.html'" class="text-xs px-4 py-2 bg-white border border-stone-200 hover:bg-stone-50 text-stone-500 rounded-full font-bold shadow-sm">🔍 返回冰山</button>
    </div>
</header>

<main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
    <section id="chat-section" class="w-full md:w-[40%] flex flex-col h-[50vh] md:h-full border-r border-amber-200 bg-white z-20 shadow-2xl overflow-hidden no-print">
        <div class="p-4 bg-amber-50 border-b border-amber-100 shrink-0"><h2 class="text-sm font-bold text-amber-900"><span>🧪</span> 內在煉金教練</h2></div>
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-4 bg-[#fefce8]"></div>
        <div class="p-4 bg-white border-t border-amber-100 shrink-0 z-30">
            <div id="input-area" class="flex flex-col gap-3 hidden">
                <textarea id="user-input" rows="3" class="w-full resize-none rounded-xl border border-amber-300 p-3 text-sm focus:ring-2 focus:ring-amber-600 bg-amber-50 shadow-inner" placeholder="請輸入... (不知道可直說)"></textarea>
                <div class="flex justify-between items-center"><span id="step-indicator" class="text-[10px] text-amber-600 font-bold uppercase tracking-widest">Step 1/4</span><button id="btn-send" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-full font-bold shadow-md active:scale-95 transition-all">送出 ➤</button></div>
            </div>
            <div id="direct-entry-area" class="flex flex-col gap-3 hidden">
                <div class="bg-amber-50 p-3 rounded-lg border border-amber-200 mb-1"><p class="text-xs text-amber-800 font-bold mb-1">請告訴我您的核心脆弱或渴望：</p></div>
                <textarea id="direct-yearning-input" rows="2" class="w-full resize-none rounded-xl border border-stone-300 p-3 text-sm bg-white" placeholder="例如：我很怕被拋棄..."></textarea>
                <div class="flex gap-2"><button onclick="window.location.href='satir_iceberg_spa.html'" class="w-1/2 bg-stone-100 text-stone-600 hover:bg-stone-200 px-4 py-2 rounded-full font-bold border border-stone-200 text-xs">返回冰山</button><button id="btn-submit-yearning" class="w-1/2 bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-full font-bold shadow-md text-xs">確認並開始</button></div>
            </div>
            <div id="completion-msg" class="hidden text-center mt-3 pt-3 border-t border-stone-100"><p class="text-xs text-amber-700 font-bold">🎉 腳本已生成。請匯出 PDF 報告。</p></div>
        </div>
    </section>

    <section id="visual-section" class="w-full md:w-[60%] h-[50vh] md:h-full bg-[#fffbeb] overflow-y-auto relative flex flex-col p-6 lg:p-10">
        <div class="print-title"><h1 class="text-3xl font-bold text-amber-900">內在煉金轉化報告</h1></div>
        <div class="bg-white/80 border border-amber-200 rounded-3xl p-5 w-full max-w-2xl mx-auto shadow-sm mb-4 no-print text-center relative z-10">
            <h3 class="text-amber-800 font-bold mb-3 text-[10px] uppercase tracking-widest">內在百寶箱 (限選一項法寶)</h3>
            <div class="grid grid-cols-4 lg:grid-cols-7 gap-2" id="toolbox-grid">
                <div class="tool-card bg-white border border-amber-100 p-2 rounded-xl flex flex-col items-center" onmouseover="showToolInfo('偵探帽')" onmouseout="hideToolInfo()" onclick="selectTool('偵探帽')"><span class="text-2xl mb-1">🕵️</span><span class="text-[9px] font-bold text-slate-700">偵探帽</span></div>
                <div class="tool-card bg-white border border-amber-100 p-2 rounded-xl flex flex-col items-center" onmouseover="showToolInfo('金鑰匙')" onmouseout="hideToolInfo()" onclick="selectTool('金鑰匙')"><span class="text-2xl mb-1">🔑</span><span class="text-[9px] font-bold text-slate-700">金鑰匙</span></div>
                <div class="tool-card bg-white border border-amber-100 p-2 rounded-xl flex flex-col items-center" onmouseover="showToolInfo('界線盾牌')" onmouseout="hideToolInfo()" onclick="selectTool('界線盾牌')"><span class="text-2xl mb-1">🛡️</span><span class="text-[9px] font-bold text-slate-700">界線盾牌</span></div>
                <div class="tool-card bg-white border border-amber-100 p-2 rounded-xl flex flex-col items-center" onmouseover="showToolInfo('勇氣手杖')" onmouseout="hideToolInfo()" onclick="selectTool('勇氣手杖')"><span class="text-2xl mb-1">🪄</span><span class="text-[9px] font-bold text-slate-700">勇氣手杖</span></div>
                <div class="tool-card bg-white border border-amber-100 p-2 rounded-xl flex flex-col items-center" onmouseover="showToolInfo('許願魔杖')" onmouseout="hideToolInfo()" onclick="selectTool('許願魔杖')"><span class="text-2xl mb-1">✨</span><span class="text-[9px] font-bold text-slate-700">許願魔杖</span></div>
                <div class="tool-card bg-white border border-amber-100 p-2 rounded-xl flex flex-col items-center" onmouseover="showToolInfo('智慧羅盤')" onmouseout="hideToolInfo()" onclick="selectTool('智慧羅盤')"><span class="text-2xl mb-1">🧭</span><span class="text-[9px] font-bold text-slate-700">智慧羅盤</span></div>
                <div class="tool-card bg-white border border-amber-100 p-2 rounded-xl flex flex-col items-center" onmouseover="showToolInfo('溫柔之心')" onmouseout="hideToolInfo()" onclick="selectTool('溫柔之心')"><span class="text-2xl mb-1">❤️</span><span class="text-[9px] font-bold text-slate-700">溫柔之心</span></div>
            </div>
            <div id="tool-info-box" class="mt-3 p-3 bg-amber-50 rounded-lg border border-amber-100 text-left text-[11px] text-amber-900 min-h-[4rem] flex items-center">💡 將滑鼠移至上方百寶箱法寶查看用途。</div>
        </div>

        <div class="w-full max-w-2xl mx-auto space-y-4 relative z-0">
            <div id="layer-0" class="visual-layer active bg-white border border-amber-200 rounded-2xl flex flex-row"><div class="ai-q-box"><h4 class="font-bold text-[10px] text-amber-800 uppercase mb-2">1. 擁抱脆弱</h4></div><div class="user-a-box"><div id="layer-text-0" class="text-[13px] font-bold">等待輸入...</div><div id="layer-analysis-0" class="hidden mt-3 pt-3 border-t text-[12px] text-amber-800"></div></div></div>
            <div id="layer-1" class="visual-layer bg-white border border-orange-200 rounded-2xl flex flex-row"><div class="ai-q-box bg-orange-50 border-orange-200"><h4 class="font-bold text-[10px] text-orange-800 uppercase mb-2">2. 內在百寶箱</h4></div><div class="user-a-box"><div id="layer-text-1" class="text-[13px] font-bold italic">尚未選擇法寶...</div><div id="layer-analysis-1" class="hidden mt-3 pt-3 border-t text-[12px] text-orange-800"></div></div></div>
            <div id="layer-2" class="visual-layer bg-white border border-red-200 rounded-2xl flex flex-row"><div class="ai-q-box bg-red-50 border-red-200"><h4 class="font-bold text-[10px] text-red-800 uppercase mb-2">3. 教練視角</h4></div><div class="user-a-box"><div id="layer-text-2" class="text-[13px] font-bold italic">尚未切換視角...</div><div id="layer-analysis-2" class="hidden mt-3 pt-3 border-t text-[12px] text-red-800"></div></div></div>
            <div id="layer-3" class="visual-layer bg-slate-900 border border-slate-800 rounded-3xl flex flex-row mt-4 mb-8"><div class="ai-q-box bg-slate-800"><h4 class="font-bold text-[11px] text-amber-400 uppercase mb-2">4. 真心話劇本</h4></div><div class="user-a-box p-6"><div id="layer-text-3" class="text-[15px] text-amber-50 font-bold italic">準備預演未來...</div><div id="layer-analysis-3" class="hidden mt-4 pt-4 border-t border-slate-700 text-[13px] text-amber-200"></div></div></div>
        </div>
    </section>
</main>

<div id="custom-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl transform scale-95 transition-transform border-t-8 border-amber-600 mx-4">
        <h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2"><span id="modal-icon">💡</span><span id="modal-title">提示</span></h3>
        <p class="text-sm text-slate-600 mb-6 whitespace-pre-wrap leading-relaxed" id="modal-desc"></p>
        <div class="flex justify-end"><button onclick="closeModal()" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-full font-bold">了解</button></div>
    </div>
</div>

<script>
const DEFAULT_PROXY_URL = ""; 
const STAGES = [
    { id: 0, nextQ: "第二步：提取資源。請從畫面上方的『內在百寶箱』點選一個最需要的法寶，你打算如何用它保護自己？" },
    { id: 1, nextQ: "第三步：教練視角。客觀看著『帶著法寶的你』與『對方』互動。你會給這個自己什麼建議？" },
    { id: 2, nextQ: "第四步：真心話劇本。請寫下一段對話，包含：1.同理對方的難處 2.表達自己的底線感受 3.具體作法。" },
    { id: 3, isSummary: true }
];

const TOOLS_INFO = {
    '偵探帽': '<span class="font-bold text-amber-700">🕵️ 偵探帽</span>：釐清事實，抽離情緒。<br><span class="text-slate-500 italic mt-1 block">範例：「我發現他只說了去拿，沒說討厭我。」</span>',
    '金鑰匙': '<span class="font-bold text-amber-700">🔑 金鑰匙</span>：換位思考。<br><span class="text-slate-500 italic mt-1 block">範例：「也許他當下真的很累，不是針對我。」</span>',
    '界線盾牌': '<span class="font-bold text-amber-700">🛡️ 界線盾牌</span>：保護底線。<br><span class="text-slate-500 italic mt-1 block">範例：「我不喜歡你這口氣，暫停對話。」</span>',
    '勇氣手杖': '<span class="font-bold text-amber-700">🪄 勇氣手杖</span>：跨出第一步。<br><span class="text-slate-500 italic mt-1 block">範例：「我誠實地告訴他我覺得受傷。」</span>',
    '許願魔杖': '<span class="font-bold text-amber-700">✨ 許願魔杖</span>：看見底層需求。<br><span class="text-slate-500 italic mt-1 block">範例：「我其實渴望被他尊重。」</span>',
    '智慧羅盤': '<span class="font-bold text-amber-700">🧭 智慧羅盤</span>：傾聽直覺。<br><span class="text-slate-500 italic mt-1 block">範例：「我知道該往哪走。」</span>',
    '溫柔之心': '<span class="font-bold text-amber-700">❤️ 溫柔之心</span>：自我接納。<br><span class="text-slate-500 italic mt-1 block">範例：「我告訴自己，這不是我的錯。」</span>'
};

let currentStep = 0; let chatHistory = []; let toolLocked = false; let sessionTokenCount = 0;
let discoveredYearning = localStorage.getItem('satir_discovered_yearning') || ""; let originalEvent = localStorage.getItem('satir_event_context') || "未提供具體事件";
let chatContainer, userInputArea, sendBtn, pdfBtn, stepIndicator, completionMsg, inputWrapper, directEntryArea, directInput;

function showModal(title, desc, icon = '💡') { document.getElementById('modal-icon').innerText = icon; document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerText = desc; const modal = document.getElementById('custom-modal'); modal.classList.remove('hidden'); setTimeout(() => modal.firstElementChild.classList.remove('scale-95'), 10); }
function closeModal() { const modal = document.getElementById('custom-modal'); modal.firstElementChild.classList.add('scale-95'); setTimeout(() => modal.classList.add('hidden'), 200); }
function showTokenUsage() { showModal('使用量', `📊 Token: ${sessionTokenCount}`, '💰'); }

window.showToolInfo = function(name) { if(!toolLocked) document.getElementById('tool-info-box').innerHTML = TOOLS_INFO[name]; };
window.hideToolInfo = function() { if(!toolLocked) document.getElementById('tool-info-box').innerHTML = '💡 將滑鼠移至上方百寶箱法寶查看用途。'; };
window.selectTool = function(toolName) { if (toolLocked) return; if (!userInputArea.disabled) { userInputArea.value = `我決定拿出百寶箱的【${toolName}】。我打算...`; userInputArea.focus(); } };

async function callGemini(userMessage) {
    let proxyUrl = localStorage.getItem('SATIR_PROXY_URL') || DEFAULT_PROXY_URL;
    if (proxyUrl.startsWith('http') && !proxyUrl.includes('/api/chat')) proxyUrl = proxyUrl.endsWith('/') ? proxyUrl + 'api/chat' : proxyUrl + '/api/chat';

    const stageGoal = [
        `▶ 第一步：擁抱脆弱。引導對話：「想像你內心渴望【${discoveredYearning}】的自己站在面前。你會對他說句什麼充滿保證的話？」`,
        `▶ 第二步：百寶箱。提問：「你最想從百寶箱拿出哪『一項』法寶(限一項)保護自己？」(限：偵探帽、金鑰匙、界線盾牌、勇氣手杖、許願魔杖、智慧羅盤、溫柔之心)`,
        `▶ 第三步：教練視角。抽離情緒，給予客觀建議。`,
        `▶ 第四步：寫下真心話腳本。`
    ][currentStep];

    const nextStepInstruction = STAGES[currentStep].isSummary ? "【指令】最後一步，給總結肯定，加上 [STEP_COMPLETE]。" : "【指令】若過關，拋出問題：" + STAGES[currentStep].nextQ + "\n加上 [STEP_COMPLETE]。";

    const systemInstruction = `你是內在煉金教練。不使用專有名詞。
事件：【${originalEvent}】 渴望：【${discoveredYearning}】
1. 字數限制 200 字以內。
2. 防呆 UX：若使用者回答「不知道」，你必須主動給出 A、B 兩個選項讓他選，此時不可輸出 [STEP_COMPLETE]。
${stageGoal}
${nextStepInstruction}
繁體中文。`;

    const context = chatHistory.slice(-4).map(h => ({ role: h.role === 'coach' ? 'model' : 'user', parts: [{ text: h.text }] }));
    try {
        const res = await fetch(proxyUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: context, systemInstruction, mode: 'ALCHEMY' }) });
        if (res.ok) { const data = await res.json(); if(data.tokenUsage) sessionTokenCount += data.tokenUsage.totalTokenCount; return data.text; }
        else { if (res.status === 429) return "⚠️ 【API 額度耗盡 429】\n\n模擬過關。教練回饋：非常有力量！ [STEP_COMPLETE]"; return `❌ 異常 (HTTP ${res.status})`; }
    } catch (err) { return `❌ 連線失敗: ${err.message}`; }
}

function createMessage(text, isUser) {
    const w = document.createElement('div'); w.className = `flex w-full chat-bubble-enter ${isUser ? 'justify-end' : 'justify-start'}`;
    const b = document.createElement('div'); b.className = `max-w-[90%] p-4 rounded-2xl shadow-sm ${isUser ? 'bg-amber-700 text-white rounded-tr-none' : 'bg-white border border-amber-200 text-slate-800 rounded-tl-none'}`;
    if (!isUser) b.innerHTML = `<div class="text-[9px] font-bold text-amber-600 mb-1 uppercase tracking-widest">教練</div>`;
    const c = document.createElement('div'); c.className = 'whitespace-pre-wrap leading-relaxed text-[14px]'; c.textContent = text;
    b.appendChild(c); w.appendChild(b); return w;
}

function startJourney(yearning, isFromIceberg = false) {
    discoveredYearning = yearning; directEntryArea.classList.add('hidden'); inputWrapper.classList.remove('hidden');
    let welcome = isFromIceberg ? `<div class="bg-amber-100 p-4 rounded-xl mb-4 text-sm border border-amber-200">冰山渴望分析：『${discoveredYearning}』</div>` : `確認了您的核心渴望是：【${discoveredYearning}】。\n\n`;
    welcome += `現在開始第一步：擁抱脆弱。請想像你內心『渴望【${discoveredYearning}】的自己』站在面前。你會對他說一句什麼樣『充滿保證與力量』的話？`;
    chatContainer.appendChild(createMessage(welcome, false)); chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function handleSend() {
    const input = userInputArea.value.trim(); if (!input) return;
    chatContainer.appendChild(createMessage(input, true)); chatHistory.push({ role: "user", text: input });
    userInputArea.value = ''; userInputArea.disabled = true; sendBtn.disabled = true;
    const typing = document.createElement('div'); typing.id = 'typing-indicator'; typing.className = 'flex justify-start chat-bubble-enter'; typing.innerHTML = `<div class="bg-white border border-amber-200 p-3 rounded-xl"><div class="text-[10px] text-amber-600 italic">引導中...</div></div>`;
    chatContainer.appendChild(typing); chatContainer.scrollTop = chatContainer.scrollHeight;

    const coachResponse = await callGemini(input);
    if (document.getElementById('typing-indicator')) document.getElementById('typing-indicator').remove();
    const isComplete = coachResponse.includes("[STEP_COMPLETE]"); const cleanResponse = coachResponse.replace("[STEP_COMPLETE]", "").trim();
    chatContainer.appendChild(createMessage(cleanResponse, false)); chatHistory.push({ role: "coach", text: cleanResponse });

    if (coachResponse.includes("❌")) { userInputArea.disabled = false; sendBtn.disabled = false; return; }

    if (isComplete) {
        if (currentStep === 1) { toolLocked = true; document.querySelectorAll('.tool-card').forEach(c => c.classList.add('locked')); document.getElementById('tool-info-box').innerHTML = '🔒 法寶已選定。'; }
        const layerEl = document.getElementById(`layer-${currentStep}`); const textEl = document.getElementById(`layer-text-${currentStep}`); const analysisEl = document.getElementById(`layer-analysis-${currentStep}`);
        if(layerEl && textEl && analysisEl) {
            layerEl.classList.add('active'); textEl.textContent = input; textEl.classList.remove('italic');
            analysisEl.innerHTML = `<span class="font-bold border-b pb-0.5 inline-block mb-1">教練回饋：</span><br>${cleanResponse}`; analysisEl.classList.remove('hidden');
        }
        currentStep++;
        if (currentStep < STAGES.length) { stepIndicator.textContent = `Step ${currentStep + 1} / ${STAGES.length}`; userInputArea.disabled = false; sendBtn.disabled = false; userInputArea.focus(); }
        else { userInputArea.disabled = true; sendBtn.disabled = true; inputWrapper.classList.add('hidden'); completionMsg.classList.remove('hidden'); pdfBtn.classList.remove('hidden'); }
    } else { userInputArea.disabled = false; sendBtn.disabled = false; userInputArea.focus(); }
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

document.addEventListener('DOMContentLoaded', () => {
    chatContainer = document.getElementById('chat-container'); userInputArea = document.getElementById('user-input'); sendBtn = document.getElementById('btn-send'); pdfBtn = document.getElementById('btn-pdf'); stepIndicator = document.getElementById('step-indicator'); completionMsg = document.getElementById('completion-msg'); inputWrapper = document.getElementById('input-area'); directEntryArea = document.getElementById('direct-entry-area'); directInput = document.getElementById('direct-yearning-input');
    pdfBtn.onclick = () => window.print(); sendBtn.onclick = handleSend; userInputArea.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

    if (localStorage.getItem('satir_phase1_completed') === 'true' && discoveredYearning) { startJourney(discoveredYearning, true); }
    else {
        directEntryArea.classList.remove('hidden');
        chatContainer.appendChild(createMessage(`您好。請在下方簡單告訴我：您剛剛在自己內心深處，發現了什麼樣『真實的脆弱或渴望』（例如：很怕被拋棄）？`, false));
        document.getElementById('btn-submit-yearning').onclick = () => {
            const val = directInput.value.trim();
            if (val === "不知道" || val === "不清楚") { showModal("提示", "若您不清楚渴望，建議先返回冰山探索！", "⚠️"); return; }
            if (val) { if (!originalEvent) originalEvent = "未提供事件"; startJourney(val, false); }
        };
    }
});
