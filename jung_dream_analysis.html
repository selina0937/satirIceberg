<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>榮格潛意識夢境解析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .visual-layer { transition: all 0.4s ease-out; opacity: 0.1; transform: translateY(10px); }
        .visual-layer.active { opacity: 1; transform: translateY(0); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .chat-bubble-enter { animation: bubbleIn 0.3s ease-out forwards; }
        @keyframes bubbleIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 10px; }

        @media print {
            .no-print { display: none !important; } * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            html, body, main, section, div, p { height: auto !important; max-height: none !important; overflow: visible !important; page-break-inside: auto !important; }
            main { display: block !important; } #chat-section { display: none !important; } 
            #visual-section { width: 100% !important; display: block !important; padding: 0 !important; background: white !important; }
            .print-title { display: block !important; text-align: center; margin-bottom: 1cm; border-bottom: 3px solid #000; padding-bottom: 15px; }
            .visual-layer { page-break-inside: avoid !important; margin-bottom: 25px !important; border: 2px solid #333 !important; border-radius: 12px !important; display: block !important; background: #fff !important; }
            .ai-q-box { background: #f8fafc !important; border-bottom: 2px solid #ddd !important; padding: 15px !important; display: block !important; }
            .user-a-box { padding: 15px !important; display: block !important; }
            .visual-layer p, .visual-layer div, .ai-analysis-text { color: #000 !important; font-size: 11pt !important; line-height: 1.6; -webkit-line-clamp: unset !important; white-space: pre-wrap !important; }
            #layer-3 { background: #fff !important; border-color: #333 !important; } #layer-3 .ai-q-box { background: #f8fafc !important; border-bottom-color: #ddd !important; } #layer-3 h4, #layer-3 p, #layer-3 div, #layer-3 .ai-analysis-text { color: #000 !important; text-shadow: none !important; }
        }
        .print-title { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-900">

<div id="token-secret-btn" class="fixed bottom-0 right-0 w-16 h-16 z-50 cursor-default no-print" title="雙擊查看 Token 消耗" ondblclick="showTokenUsage()"></div>

<header class="bg-white border-b border-indigo-200 px-6 py-3 flex justify-between items-center shadow-sm shrink-0 z-40 no-print">
    <div class="flex items-center gap-4"><a href="index.html" class="flex items-center gap-1 text-sm font-bold text-stone-500 hover:text-indigo-600 transition-colors bg-stone-100 px-3 py-1.5 rounded-full"><span>🏠</span> 首頁</a><div class="flex items-center gap-2"><span class="text-2xl">🌙</span><h1 class="text-base font-bold tracking-tight text-indigo-900">榮格夢境解析 <span class="text-[10px] bg-indigo-600 text-white px-2 py-0.5 rounded ml-1">Jungian</span></h1></div></div>
    <div class="flex items-center gap-3">
        <div id="user-info" class="flex items-center gap-2 hidden md:flex"></div>
        <button id="auth-btn" class="bg-white border border-indigo-200 hover:bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full text-xs font-bold flex items-center shadow-sm transition-all">登入</button>
        <div class="w-px h-4 bg-indigo-200 mx-1"></div>
        <button id="btn-pdf" class="hidden text-xs px-4 py-2 bg-indigo-700 hover:bg-indigo-800 text-white rounded-full font-bold shadow-lg">匯出夢境解析</button>
    </div>
</header>

<main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
    <section id="chat-section" class="w-full md:w-[40%] flex flex-col h-[50vh] md:h-full border-r border-indigo-200 bg-white z-20 shadow-2xl overflow-hidden no-print">
        <div class="p-4 bg-indigo-50 border-b border-indigo-100 shrink-0"><h2 class="text-sm font-bold text-indigo-900"><span>🌌</span> 潛意識引導師</h2></div>
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-4 bg-[#f8fafc]"></div>
        <div class="p-4 bg-white border-t border-indigo-100 shrink-0 z-30">
            <div id="input-area" class="flex flex-col gap-3">
                <textarea id="user-input" rows="3" class="w-full resize-none rounded-xl border border-indigo-300 p-3 text-sm focus:ring-2 focus:ring-indigo-600 bg-indigo-50" placeholder="請輸入..."></textarea>
                <div class="flex justify-between items-center"><span id="step-indicator" class="text-[10px] text-indigo-600 font-bold uppercase tracking-widest">Step 1/4</span><button id="btn-send" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full font-bold shadow-md active:scale-95 transition-all">送出 ➤</button></div>
            </div>
            <div id="completion-msg" class="hidden text-center mt-3 pt-3 border-t border-stone-100"><p class="text-xs text-indigo-700 font-bold">🎉 解析完成。請匯出 PDF。</p></div>
        </div>
    </section>

    <section id="visual-section" class="w-full md:w-[60%] h-[50vh] md:h-full bg-[#eef2ff] overflow-y-auto relative flex flex-col p-6 lg:p-10">
        <div class="print-title"><h1 class="text-3xl font-bold text-indigo-900">榮格夢境解析報告</h1></div>
        <div class="w-full max-w-2xl mx-auto space-y-4 relative z-0">
            <div id="layer-0" class="visual-layer active bg-white border border-indigo-200 rounded-2xl"><div class="ai-q-box bg-indigo-50 p-4"><h4 class="font-bold text-[12px] text-indigo-800 uppercase mb-1">1. 夢境顯像</h4></div><div class="user-a-box p-5"><div id="layer-text-0" class="text-sm font-bold">等待輸入...</div><div id="layer-analysis-0" class="hidden mt-3 pt-3 border-t text-[12px] text-indigo-800"></div></div></div>
            <div id="layer-1" class="visual-layer bg-white border border-indigo-200 rounded-2xl"><div class="ai-q-box bg-indigo-50 p-4"><h4 class="font-bold text-[12px] text-indigo-800 uppercase mb-1">2. 現實連結</h4></div><div class="user-a-box p-5"><div id="layer-text-1" class="text-sm font-bold italic">尚未觸及...</div><div id="layer-analysis-1" class="hidden mt-3 pt-3 border-t text-[12px] text-indigo-800"></div></div></div>
            <div id="layer-2" class="visual-layer bg-white border border-indigo-200 rounded-2xl"><div class="ai-q-box bg-indigo-50 p-4"><h4 class="font-bold text-[12px] text-indigo-800 uppercase mb-1">3. 原型與陰影</h4></div><div class="user-a-box p-5"><div id="layer-text-2" class="text-sm font-bold italic">尚未觸及...</div><div id="layer-analysis-2" class="hidden mt-3 pt-3 border-t text-[12px] text-indigo-800"></div></div></div>
            <div id="layer-3" class="visual-layer bg-indigo-950 border border-indigo-800 rounded-3xl mt-4 mb-10"><div class="ai-q-box bg-indigo-900 p-6"><h4 class="font-bold text-[12px] text-indigo-300 uppercase mb-1">4. 個體化行動</h4></div><div class="user-a-box p-6"><div id="layer-text-3" class="text-[15px] text-indigo-50 font-bold italic">整合中...</div><div id="layer-analysis-3" class="hidden mt-4 pt-4 border-t text-[13px] text-indigo-200"></div></div></div>
        </div>
    </section>
</main>

<script>
const DEFAULT_PROXY_URL = ""; 
const STAGES = [
    { id: 0, nextQ: "第二步：現實連結。這個夢裡的『元素』或『人』，讓你聯想到現實生活中的哪件事或哪種情緒？" },
    { id: 1, nextQ: "第三步：原型與陰影。夢裡的怪物或逃避的事物，往往是壓抑的『陰影』。如果這是在給你隱喻，你覺得潛意識想提醒你什麼？" },
    { id: 2, nextQ: "第四步：個體化行動。將這份啟示帶回現實中，你今天可以為自己做出什麼『具體的微小行動』？" },
    { id: 3, isSummary: true }
];

let currentStep = 0; let chatHistory = []; let sessionTokenCount = 0;
let chatContainer, userInputArea, sendBtn, pdfBtn, stepIndicator, completionMsg, inputWrapper;

async function callGemini(userMessage) {
    let proxyUrl = localStorage.getItem('SATIR_PROXY_URL') || DEFAULT_PROXY_URL;
    if (proxyUrl.startsWith('http') && !proxyUrl.includes('/api/chat')) proxyUrl = proxyUrl.endsWith('/') ? proxyUrl + 'api/chat' : proxyUrl + '/api/chat';

    const stage = STAGES[currentStep];
    const systemInstruction = `你是榮格派的夢境潛意識引導師。
1. 字數：每次回覆絕對不可超過 300 字。
2. 分析：提取「原型象徵」或「陰影」。若回答不知道，主動給予 2 個方向。此時不准過關。
3. 過關標記：給出回答後，在最尾端加上 [STEP_COMPLETE]。
${stage.isSummary ? "4. 最後一步。給予整合祝福與肯定，加上 [STEP_COMPLETE]。" : "4. 若過關，拋出問題：" + stage.nextQ}
繁體中文。`;

    const context = chatHistory.slice(-4).map(h => ({ role: h.role === 'coach' ? 'model' : 'user', parts: [{ text: h.text }] }));
    try {
        const res = await fetch(proxyUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: context, systemInstruction, mode: 'DREAM' }) });
        if (res.ok) { const data = await res.json(); if(data.tokenUsage) sessionTokenCount += data.tokenUsage.totalTokenCount; return data.text; }
        else return `❌ 異常 (HTTP ${res.status})`;
    } catch (err) { return `❌ 連線失敗`; }
}

function createMessage(text, isUser) {
    const w = document.createElement('div'); w.className = `flex w-full chat-bubble-enter ${isUser ? 'justify-end' : 'justify-start'}`;
    const b = document.createElement('div'); b.className = `max-w-[90%] p-4 rounded-2xl shadow-sm ${isUser ? 'bg-indigo-700 text-white rounded-tr-none' : 'bg-white border text-slate-800 rounded-tl-none'}`;
    if (!isUser) b.innerHTML = `<div class="text-[9px] font-bold text-indigo-600 mb-1 uppercase tracking-widest">引導師</div>`;
    const c = document.createElement('div'); c.className = 'whitespace-pre-wrap leading-relaxed text-[14px]'; c.textContent = text;
    b.appendChild(c); w.appendChild(b); return w;
}

async function handleSend() {
    const input = userInputArea.value.trim(); if (!input) return;
    chatContainer.appendChild(createMessage(input, true)); chatHistory.push({ role: "user", text: input });
    userInputArea.value = ''; userInputArea.disabled = true; sendBtn.disabled = true;
    const typing = document.createElement('div'); typing.id = 'typing-indicator'; typing.className = 'flex justify-start chat-bubble-enter'; typing.innerHTML = `<div class="bg-white p-3 rounded-xl"><div class="text-[10px] text-indigo-600 italic">解析中...</div></div>`;
    chatContainer.appendChild(typing); chatContainer.scrollTop = chatContainer.scrollHeight;

    const coachResponse = await callGemini(input);
    if (document.getElementById('typing-indicator')) document.getElementById('typing-indicator').remove();
    const isComplete = coachResponse.includes("[STEP_COMPLETE]"); const cleanResponse = coachResponse.replace("[STEP_COMPLETE]", "").trim();
    chatContainer.appendChild(createMessage(cleanResponse, false)); chatHistory.push({ role: "coach", text: cleanResponse });

    if (coachResponse.includes("❌")) { userInputArea.disabled = false; sendBtn.disabled = false; return; }

    if (isComplete) {
        const layerEl = document.getElementById(`layer-${currentStep}`); const textEl = document.getElementById(`layer-text-${currentStep}`); const analysisEl = document.getElementById(`layer-analysis-${currentStep}`);
        if(layerEl && textEl && analysisEl) { layerEl.classList.add('active'); textEl.textContent = input; textEl.classList.remove('italic'); analysisEl.innerHTML = `<span class="font-bold border-b pb-0.5 inline-block mb-1">解析：</span><br>${cleanResponse}`; analysisEl.classList.remove('hidden'); }
        currentStep++;
        if (currentStep < STAGES.length) { stepIndicator.textContent = `Step ${currentStep + 1} / ${STAGES.length}`; userInputArea.disabled = false; sendBtn.disabled = false; userInputArea.focus(); }
        else { userInputArea.disabled = true; sendBtn.disabled = true; inputWrapper.classList.add('hidden'); completionMsg.classList.remove('hidden'); pdfBtn.classList.remove('hidden'); }
    } else { userInputArea.disabled = false; sendBtn.disabled = false; userInputArea.focus(); }
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

document.addEventListener('DOMContentLoaded', () => {
    chatContainer = document.getElementById('chat-container'); userInputArea = document.getElementById('user-input'); sendBtn = document.getElementById('btn-send'); pdfBtn = document.getElementById('btn-pdf'); stepIndicator = document.getElementById('step-indicator'); completionMsg = document.getElementById('completion-msg'); inputWrapper = document.getElementById('input-area');
    pdfBtn.onclick = () => window.print(); sendBtn.onclick = handleSend; userInputArea.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
    chatContainer.appendChild(createMessage(`歡迎。\n\n第一步：夢境顯像。請描述一個印象深刻的夢。場景、人物、怪物及您的『情緒』是什麼？`, false));
});
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCVUQRXSsmSqHriQNqRMRr7LjrRBSUhAhM",
  authDomain: "satir-iceberg.vercel.app",
  projectId: "satiriceberg-c1edd",
  storageBucket: "satiriceberg-c1edd.firebasestorage.app",
  messagingSenderId: "1095208613783",
  appId: "1:1095208613783:web:698bddaed121b2aeb7b6d2",
  measurementId: "G-TYTJP45Q94"
};    
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const provider = new GoogleAuthProvider();
    const authBtn = document.getElementById('auth-btn'); const userInfo = document.getElementById('user-info');
    onAuthStateChanged(auth, (user) => {
        if (user) { userInfo.innerHTML = `<img src="${user.photoURL}" class="w-6 h-6 rounded-full"><span class="text-xs font-bold text-indigo-800">${user.displayName}</span>`; authBtn.innerHTML = `登出`; authBtn.classList.replace('text-indigo-700', 'text-red-500'); authBtn.onclick = () => signOut(auth); }
        else { userInfo.innerHTML = ''; authBtn.innerHTML = `登入`; authBtn.classList.replace('text-red-500', 'text-indigo-700'); authBtn.onclick = async () => { try { await signInWithPopup(auth, provider); } catch (e) {} }; }
    });
</script>
</body>
</html>
